name: Keep Render Alive (ALMT Business Hours)

on:
  schedule:
    # 카자흐스탄 표준시(ALMT, UTC+5) 기준 오전 07:00부터 오후 05:00까지 작동하도록 설정.
    # Render Free Plan은 15분간 요청이 없으면 Sleep 모드로 전환됩니다.
    # GitHub Action cron은 지연 발생 가능성이 높으므로 10분 간격으로 설정하여 안정성을 높임.
    # UTC 02:00 ~ 12:59 (ALMT 07:00 ~ 17:59) 동안 10분마다 실행
    - cron: '*/10 2-12 * * *'
  workflow_dispatch: # Actions 탭에서 수동 실행 버튼을 제공합니다.

jobs:
  keep-alive:
    name: Send Ping Request
    runs-on: ubuntu-latest
    steps:
      - name: HTTP GET Request to Render Service
        run: |
          echo "Pinging services to keep them awake..."
          
          # 1. 메인 서비스 (사용자 확인 URL)
          MAIN_STATUS=$(curl -L -s -o /dev/null -w "%{http_code}" https://construction-report.onrender.com/)
          echo "Main Service (construction-report) Status: $MAIN_STATUS"
          
          # 2. 백업 서비스 (추후 중지 예정이나 현재 함께 유지)
          BACKUP_STATUS=$(curl -L -s -o /dev/null -w "%{http_code}" https://construction-daily-report.onrender.com/)
          echo "Backup Service (construction-daily-report) Status: $BACKUP_STATUS"
          
          echo "Ping complete."
